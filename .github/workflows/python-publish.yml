name: Deploy automatico pf

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "nadoutti"
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: nadoutti/pf-back:${{ github.sha }}

      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_TEST }}
          username: "ubuntu"
          key: ${{ secrets.KEY_TEST }}
          port: 22
          script: |
            sudo docker stop pf-back
            sudo docker rm --force pf-back
            sudo docker run  -d -p 8080:8000 -e MONGO_URI=${{ secrets.MONGO_URI }} -e AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }} -e AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }} -e AUTH0_NAMESPACE=${{ secrets.AUTH0_NAMESPACE }} -e MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }} --network=rede --name ingressos nadoutti/pf-back:${{ github.sha }}
